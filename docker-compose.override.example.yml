# Copy to docker-compose.override.yml and adjust.
# Example: run Ollama inside Docker on Linux + NVIDIA GPU for STT.

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"

  app:
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama

  stt:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
