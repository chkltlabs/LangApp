name: Coverage

on:
  pull_request:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Backend tests and Cobertura
        working-directory: backend
        env:
          PYTHONPATH: .
        run: pytest tests -q --cov=app --cov-report=xml:coverage-cobertura.xml --cov-fail-under=80

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests and Cobertura
        working-directory: frontend
        run: >-
          npx vitest run --coverage
          --coverage.reporter=text
          --coverage.reporter=cobertura
          --coverage.reportsDirectory=./coverage

      - name: Merge Cobertura reports
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: "${{ github.workspace }}/backend/coverage-cobertura.xml;${{ github.workspace }}/frontend/coverage/cobertura-coverage.xml"
          targetdir: "${{ github.workspace }}/coverage-combined"
          reporttypes: Cobertura

      - name: Verify merged Cobertura
        run: compgen -G 'coverage-combined/*.xml' >/dev/null || (ls -laR coverage-combined; exit 1)

      - name: Upload Cobertura artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cobertura
          if-no-files-found: error
          path: |
            backend/coverage-cobertura.xml
            frontend/coverage/cobertura-coverage.xml
            coverage-combined/

      - name: Code coverage summary
        uses: chkltlabs/CodeCoverageSummary@v2.1.3
        with:
          filename: "coverage-combined/*.xml"
          format: markdown
          output: both
          badge: true
          indicators: true
          fail_below_min: "true"
          thresholds: "80 90"

      - name: Post coverage summary on PR
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2.9.2
        with:
          header: coverage-summary
          recreate: true
          path: code-coverage-results.md
